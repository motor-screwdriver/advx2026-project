name: Build

on:
  push:
    branches: [feature/build]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  EXPO_NO_TELEMETRY: 1

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"
      - name: Sync version
        run: |
          node <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.version = version;
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          EOF
        env:
          VERSION: ${{ steps.version.outputs.version }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npx expo prebuild --platform android --non-interactive
      - run: ./gradlew assembleRelease --no-daemon
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/*.apk

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"
      - name: Sync version
        run: |
          node <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.version = version;
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          EOF
        env:
          VERSION: ${{ steps.version.outputs.version }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx expo prebuild --platform ios --non-interactive
      - run: pod install
        working-directory: ios
      - name: Build
        working-directory: ios
        run: |
          WORKSPACE=$(find . -maxdepth 1 -name '*.xcworkspace' -type d | head -n 1)
          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print((d.get('workspace') or d.get('project'))['schemes'][0])
          ")
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ steps.version.outputs.version }}
          path: ios/build/Build/Products/Release-iphonesimulator/*.app
