name: Build

on:
  push:
    branches: [main, feature/build]
  workflow_dispatch:

env:
  EXPO_NO_TELEMETRY: 1

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npx expo prebuild --platform android --non-interactive
      - run: ./gradlew assembleDebug --no-daemon
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx expo prebuild --platform ios --non-interactive
      - run: pod install
        working-directory: ios
      - name: Build
        working-directory: ios
        run: |
          WORKSPACE=$(find . -maxdepth 1 -name '*.xcworkspace' -type d | head -n 1)
          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print((d.get('workspace') or d.get('project'))['schemes'][0])
          ")
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/build/Build/Products/Debug-iphonesimulator/*.app
